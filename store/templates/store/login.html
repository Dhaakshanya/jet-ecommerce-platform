<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — JET</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --myntra-pink: #ff3f6c; --myntra-dark: #282c3f; }
    body { background: #f5f5f6; font-family: 'Segoe UI', sans-serif; }
    .card { border: none; border-radius: 12px; }
    .btn-myntra { background: var(--myntra-pink); color: #fff; border: none; font-weight: 700; border-radius: 4px; }
    .btn-myntra:hover { background: #e0355f; color: #fff; }
    .brand { font-weight: 900; font-size: 2rem; color: var(--myntra-pink); letter-spacing: 2px; }
  </style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh">
  <div class="card shadow p-4" style="width:100%;max-width:420px">
    <div class="text-center mb-3">
      <div class="brand">JET</div>
      <p class="text-muted small">Login to shop or manage your products</p>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-danger py-2">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" name="username" class="form-control" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-myntra w-100 btn-lg">Log In</button>
    </form>

    <p class="text-center mt-3 mb-0 text-muted small">
      New here? <a href="{% url 'register' %}" style="color:var(--myntra-pink)">Create account</a>
    </p>
  </div>
</div>
</body>
</html>

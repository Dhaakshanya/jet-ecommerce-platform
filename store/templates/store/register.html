<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register — JET</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --myntra-pink: #ff3f6c; --myntra-dark: #282c3f; }
    body { background: #f5f5f6; font-family: 'Segoe UI', sans-serif; }
    .card { border: none; border-radius: 12px; }
    .btn-myntra { background: var(--myntra-pink); color: #fff; border: none; font-weight: 700; border-radius: 4px; }
    .btn-myntra:hover { background: #e0355f; color: #fff; }
    .brand { font-weight: 900; font-size: 2rem; color: var(--myntra-pink); letter-spacing: 2px; }
    .producer-toggle { border: 2px solid #eee; border-radius: 8px; padding: 12px 16px; cursor: pointer; transition: all 0.15s; }
    .producer-toggle:has(input:checked) { border-color: var(--myntra-pink); background: #fff0f3; }
  </style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh">
  <div class="card shadow p-4" style="width:100%;max-width:440px">
    <div class="text-center mb-3">
      <div class="brand">JET</div>
      <p class="text-muted small">Create your account</p>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-danger py-2">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" name="username" class="form-control" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <input type="email" name="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password1" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Confirm Password</label>
        <input type="password" name="password2" class="form-control" required>
      </div>

      <!-- Producer toggle -->
      <div class="producer-toggle mb-4 d-flex align-items-center gap-3">
        <input type="checkbox" name="is_producer" id="is_producer" class="form-check-input mt-0" style="width:20px;height:20px">
        <div>
          <label for="is_producer" class="fw-bold mb-0" style="cursor:pointer">I also want to sell products</label>
          <div class="text-muted small">Enable producer dashboard to list your products</div>
        </div>
      </div>

      <button type="submit" class="btn btn-myntra w-100 btn-lg">Create Account</button>
    </form>

    <p class="text-center mt-3 mb-0 text-muted small">
      Already have an account? <a href="{% url 'login' %}" style="color:var(--myntra-pink)">Log in</a>
    </p>
  </div>
</div>
</body>
</html>
